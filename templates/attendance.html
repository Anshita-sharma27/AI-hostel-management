<!DOCTYPE html>
<html>
<head>

    <title>AI Face Attendance</title>

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            text-align:center;
        }

        h1{
            margin-top:20px;
            color:#38bdf8;
        }

        .camera-box{
            width:900px;
            margin:auto;
            margin-top:20px;
            border:4px solid #38bdf8;
            border-radius:20px;
            overflow:hidden;
            position:relative;
        }

        video{
            width:100%;
            height:600px;
            object-fit:cover;
        }

        canvas{
            position:absolute;
            top:0;
            left:0;
        }

        #result{
            margin-top:20px;
            font-size:28px;
            color:#22c55e;
            font-weight:bold;
        }

        #student{
            margin-top:10px;
            font-size:35px;
            color:#facc15;
        }

        .name-tag{
            position:absolute;
            background:#22c55e;
            color:black;
            padding:5px 10px;
            font-size:18px;
            border-radius:5px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<h1>AI Face Attendance Scanner (LIVE AI BOX)</h1>

<div class="camera-box">

    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>

</div>

<div id="student"></div>
<div id="result">Starting Camera...</div>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Start camera
navigator.mediaDevices.getUserMedia({ video:true })
.then(stream => {
    video.srcObject = stream;
});

// LIVE BOX + NAME DRAW
video.addEventListener('play', () => {

    function draw(){

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.clearRect(0,0,canvas.width,canvas.height);

        // FACE BOX
        ctx.strokeStyle = '#22c55e';
        ctx.lineWidth = 4;

        let boxX = canvas.width/2 - 120;
        let boxY = canvas.height/2 - 150;

        ctx.strokeRect(boxX, boxY, 240, 300);

        ctx.font = "22px Arial";
        ctx.fillStyle = "#22c55e";

        ctx.fillText(
            "Detecting Face...",
            boxX,
            boxY - 10
        );

        requestAnimationFrame(draw);
    }

    draw();
});

// AUTO SCAN + ATTENDANCE
function sendFrame(){

    if(video.readyState === 4){

        let tempCanvas = document.createElement("canvas");
        let tempCtx = tempCanvas.getContext("2d");

        tempCanvas.width = video.videoWidth;
        tempCanvas.height = video.videoHeight;

        tempCtx.drawImage(video, 0, 0);

        tempCanvas.toBlob(blob => {

            let formData = new FormData();
            formData.append("frame", blob, "frame.jpg");

            fetch("/scan_face", {
                method: "POST",
                body: formData
            })
            .then(res => res.json())
            .then(data => {

                document.getElementById("result").innerText = data.message;

                if(data.student){

                    document.getElementById("student").innerText =
                    "Detected: " + data.student;

                    // LIVE NAME TAG ON SCREEN
                    ctx.fillStyle = "#22c55e";
                    ctx.font = "25px Arial";
                    ctx.fillText(
                        data.student,
                        canvas.width/2 - 50,
                        canvas.height/2 - 160
                    );
                }

            })
            .catch(err => console.log(err));

        }, "image/jpeg");

    }
}

// AUTO RUN
setInterval(sendFrame, 2000);

</script>

</body>
</html>
